defaults:
  - dataset: cifar10
  - model: resnet_cifar10
  - _self_

name: scan
mode: svd
device: cuda
print_config: true

num_epochs: 30
batch_size: 64
resnet_width: 8
resnet_num_blocks: 1
result_id_fields: [resnet_width, resnet_num_blocks]
loss: ce

# Microbatch sweep: batch_size=64 so effective Jacobian rows = 64/mb
# mb=1: 64 rows (full per-sample), mb=64: 1 row (equivalent to standard gradient)
microbatch_sizes: [1, 2, 4, 8, 16, 32, 64]

# k must be <= effective batch size (64/mb), so use k_fractions
# to automatically scale k relative to effective batch size
k_fractions: [0.25, 0.5, 1.0]
lrs: [0.05, 0.1, 0.5]
rtol: [1e-2]
svd_mode: [torch]
use_rmsprop: true
alpha_rmsProp: 0.99

loader_seed: 51159
model_seeds: [47612, 1, 2]
