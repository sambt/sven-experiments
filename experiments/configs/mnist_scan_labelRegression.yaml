defaults:
  - dataset: mnist
  - model: mlp_mnist
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 20
batch_size: 64
mlp_width: 32
result_id_fields: [mlp_width]
loss: label_regression

k_values: [4, 8, 16, 32, 48, 64]
lrs: [0.05,0.1,0.5]
rtol: [1e-4, 1e-3, 1e-2]
svd_mode: [randomized]
use_rmsprop: false
alpha_rmsProp: 0.99
variable_k: false

lrs_standard: [1e-4,1e-3,1e-2]
optimizers_standard: [Adam, SGD, RMSprop]

loader_seed: 51159
model_seed: 47612