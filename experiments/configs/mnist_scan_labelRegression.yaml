defaults:
  - dataset: mnist
  - model: mlp_mnist
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 20
batch_size: 64
mlp_width: 32
result_id_fields: [mlp_width]
loss: label_regression

k_values: [1, 2, 4, 8, 16, 32, 48, 64]
lrs: [0.05,0.1,0.5]
rtol: [1e-4, 1e-3, 1e-2]
svd_mode: [torch]
use_rmsprop: false
alpha_rmsProp: 0.99
variable_k: false

lrs_standard: [1e-4,1e-3,1e-2]
optimizers_standard: [Adam, SGD, RMSprop, LBFGS]
lrs_lbfgs: [0.1, 0.5, 1.0]
lbfgs_max_iter: [1,2,5,10,15,20]
lbfgs_line_search_fn: [strong_wolfe, null]
lbfgs_history_size: [100]

loader_seed: 51159
model_seed: 47612