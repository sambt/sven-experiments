defaults:
  - dataset: cifar10
  - model: resnet_cifar10
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 30
batch_size: 64
resnet_width: 8
resnet_num_blocks: 1
result_id_fields: [resnet_width, resnet_num_blocks]
loss: label_regression

# SVD optimizer sweep
k_values: [4, 8, 16, 32, 64]
lrs: [0.01, 0.05, 0.1, 0.5]
rtol: [1e-3, 1e-2, 1e-1]
svd_mode: [torch]
use_rmsprop: true
alpha_rmsProp: 0.99

# Standard optimizer sweep (Adam, RMSprop, SGD only)
lrs_standard: [1e-4, 1e-3, 1e-2, 1e-1]
optimizers_standard: [Adam, RMSprop, SGD, PolyakSGD]

loader_seed: 51159
model_seeds: [47612, 1, 2]
