defaults:
  - dataset: random_polynomial
  - model: mlp_polynomial
  - _self_

name: scan
mode: svd
device: cuda
print_config: true

num_epochs: 20
batch_size: 32
mlp_width: 16
input_dim: 6
degree: 4
result_id_fields: [mlp_width]
loss: mse

# Param fraction sweep: Jacobian columns from ~673 to frac*673
param_fractions: [0.1, 0.25, 0.5, 0.75, 1.0]

k_values: [16, 32]
lrs: [0.05, 0.1, 0.5, 1.0]
rtol: [1e-2]
svd_mode: [torch]
use_rmsprop: false

loader_seed: 82464
model_seeds: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009]
data_seed: 57728
