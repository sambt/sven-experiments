defaults:
  - dataset: mnist
  - model: mlp_mnist
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 20
batch_size: 64
mlp_width: 32
result_id_fields: [mlp_width]
loss: ce

k_values: [4, 8, 16, 32]
lrs: [0.01, 0.05, 0.1]
rtol: [1e-3, 1e-2, 1e-1]
svd_mode: [randomized]
use_rmsprop: true
alpha_rmsProp: 0.99
variable_k: false

lrs_standard: [1e-4,1e-3,1e-2]
optimizers_standard: [Adam, SGD, RMSprop]

loader_seed: 51159
model_seed: 47612