defaults:
  - dataset: cifar10
  - model: resnet_cifar10
  - _self_

name: scan
mode: svd
device: cuda
print_config: true

num_epochs: 30
batch_size: 64
resnet_width: 8
resnet_num_blocks: 1
result_id_fields: [resnet_width, resnet_num_blocks]
loss: label_regression

# Param fraction sweep: Jacobian columns from ~20K to frac*20K
param_fractions: [0.1, 0.25, 0.5, 0.75, 1.0]

k_values: [8, 16, 32, 64]
lrs: [0.05, 0.1, 0.5]
rtol: [1e-2]
svd_mode: [torch]
use_rmsprop: true
alpha_rmsProp: 0.99

loader_seed: 51159
model_seeds: [47612, 1, 2]
