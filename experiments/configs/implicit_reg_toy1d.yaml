defaults:
  - dataset: toy_1d_small
  - model: mlp_1d_regression
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 100
batch_size: 32
mlp_width: 64          # overparameterized relative to n_train=100
result_id_fields: [mlp_width]
loss: mse

# SVD hyperparameter grid
k_values: [1, 2, 4, 8, 16, 32]
lrs: [0.05, 0.1, 0.5, 1.0]
rtol: [1e-4, 1e-3]
svd_mode: [torch]
use_rmsprop: false
alpha_rmsProp: 0.99
variable_k: false

# Standard optimizer baselines
lrs_standard: [1e-4, 1e-3, 1e-2, 1e-1]
optimizers_standard: [Adam, AdamW, SGD]
weight_decays: [0.0, 1e-4, 1e-3, 1e-2]   # non-zero values applied to AdamW only

# Opt-in tracking for implicit regularization study
track_param_norm: true

# Multiple seeds for statistical reliability
seeds: [1, 2, 3, 4, 5]
loader_seed: 51159
data_seed: 54631
