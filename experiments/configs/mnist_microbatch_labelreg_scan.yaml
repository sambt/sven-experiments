defaults:
  - dataset: mnist
  - model: mlp_mnist
  - _self_

name: scan
mode: svd
device: cuda
print_config: true

num_epochs: 20
batch_size: 64
mlp_width: 32
result_id_fields: [mlp_width]
loss: label_regression

# Microbatch sweep: effective Jacobian rows = 64/mb
microbatch_sizes: [1, 2, 4, 8, 16, 32, 64]

k_values: [32, 64]
lrs: [0.05, 0.1, 0.5, 1.0]
rtol: [1e-4]
svd_mode: [torch]

loader_seed: 51159
model_seeds: [3000, 3001, 3002, 3003, 3004, 3005, 3006, 3007, 3008, 3009]
