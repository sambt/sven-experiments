defaults:
  - dataset: mnist
  - model: mlp_mnist
  - _self_

name: scan
mode: svd
device: cuda
print_config: true

num_epochs: 20
batch_size: 64
mlp_width: 32
result_id_fields: [mlp_width]
loss: label_regression

# Microbatch sweep: effective Jacobian rows = 64/mb
microbatch_sizes: [1, 2, 4, 8, 16, 32, 64]

k_fractions: [0.25, 0.5, 1.0]
lrs: [0.05, 0.1, 0.5]
rtol: [1e-2]
svd_mode: [torch]
use_rmsprop: true
alpha_rmsProp: 0.99

loader_seed: 51159
model_seeds: [47612, 1, 2]
