experiment:
  name: polynomial_scan
  #
  input_dim: 6
  data_seed: 57728
  degree: 4
  #
  num_epochs: 20
  batch_size: 32
  mlp_width: 16
  k_fractions: [0.25,0.5,0.75,1.0]
  lrs: [0.1,0.5,1.0]
  rtol: 1e-3
  #
  lrs_standard: [1e-4,1e-3,1e-2]
  optimizers_standard: [Adam,AdamW,SGD,RMSprop]
  #
  loader_seed: 82464
  output_file: polynomial_scan_results_dim${experiment.input_dim}_deg${experiment.degree}

model:
  _target_: sv3.nn.MLP
  input_dim: ${experiment.input_dim}
  hidden_dims:
  - ${experiment.mlp_width}
  - ${experiment.mlp_width}
  - ${experiment.mlp_width}
  output_dim: 1
  activation: gelu

dataset:
  _target_: experiments.datasets.RandomPolynomialDataset
  degree: ${experiment.degree}
  num_vars: ${experiment.input_dim}
  seed: ${experiment.data_seed}

device: cuda
print_config: true