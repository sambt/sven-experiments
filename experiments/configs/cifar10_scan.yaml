defaults:
  - dataset: cifar10
  - model: resnet_cifar10
  - _self_

name: scan
mode: both
device: cuda
print_config: true

num_epochs: 20
batch_size: 32
resnet_width: 6
result_id_fields: [resnet_width]
loss: ce

k_values: [4, 8, 16, 32]
lrs: [0.01, 0.05, 0.1]
rtol: [1e-3, 1e-2, 1e-1]
svd_mode: [torch]
use_rmsprop: true
alpha_rmsProp: 0.99

lrs_standard: [1e-3, 1e-2]
optimizers_standard: [Adam, SGD, RMSprop]

loader_seed: 51159
model_seed: 47612
