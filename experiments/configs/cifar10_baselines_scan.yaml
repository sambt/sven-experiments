defaults:
  - dataset: cifar10
  - model: resnet_cifar10
  - _self_

name: scan
mode: standard   # standard only — no SVD scan here (Sven's memory overhead is prohibitive at this scale)
device: cuda
print_config: true

num_epochs: 30
batch_size: 128
resnet_width: 4
result_id_fields: [resnet_width]
loss: ce

# Standard optimizer sweep: all key baselines from the literature review
# AdamW: decoupled weight decay (Loshchilov & Hutter, 2019) — uses torch.optim.AdamW default wd=0.01
# Lion: sign-based (Chen et al., NeurIPS 2023) — needs smaller LR than Adam (typically 3x-10x smaller)
# Muon: SVD-orthogonalized SGD (Jordan et al., 2024) — needs larger LR
# ScheduleFreeAdamW / ScheduleFreeSGD: no LR schedule needed (Defazio et al., NeurIPS 2024 Oral)
optimizers_standard: [Adam, AdamW, SGD, Lion, Muon, ScheduleFreeAdamW, ScheduleFreeSGD]

lrs_standard: [1e-4, 3e-4, 1e-3, 3e-3, 1e-2, 3e-2, 1e-1]

loader_seed: 51159
model_seed: 47612
